<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentAPet | Available Pets</title>
    <style>
        /* --- VARIABLES & RESET --- */
        :root {
            --primary: #ff6b6b;
            --primary-soft: #ff8787;
            --secondary: #4ecdc4;
            --dark: #2d3436;
            --light-bg: #f0f2f5;
            --white: #ffffff;
            --gray: #636e72;
            --glass: rgba(255, 255, 255, 0.8);
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
            color: var(--dark);
            background-color: var(--light-bg);
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        header {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 1.2rem;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo a {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hamburger { display: block; cursor: pointer; background: none; border: none; z-index: 1100; }
        .hamburger span { display: block; width: 25px; height: 2px; background-color: var(--dark); margin: 6px 0; transition: var(--transition); }
        .hamburger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        nav {
            position: fixed; top: 0; right: 0; height: 100vh; width: 100%;
            background: var(--white); clip-path: circle(0% at 100% 0%);
            transition: clip-path 0.6s ease-in-out;
            display: flex; align-items: center; justify-content: center;
        }

        nav.active { clip-path: circle(150% at 100% 0%); }
        nav ul { list-style: none; text-align: center; }
        nav ul li { margin: 2rem 0; }
        nav a { text-decoration: none; color: var(--dark); font-weight: 700; font-size: 1.5rem; transition: var(--transition); }
        nav a:hover, nav a.active { color: var(--primary); }

        /* --- FILTER BAR STYLES --- */
        .filter-section {
            max-width: 1400px;
            margin: 0 auto 1rem;
            padding: 0 1.5rem;
        }

        .filter-container {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group input[type="text"], 
        .filter-group select {
            padding: 0.8rem;
            border: 1px solid #eee;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
            background: #f9f9f9;
        }

        .filter-group input:focus, 
        .filter-group select:focus {
            border-color: var(--secondary);
            background: white;
        }

        #price-value {
            font-weight: 700;
            color: var(--primary);
            margin-left: auto;
        }

        /* --- PET GALLERY STYLES --- */
        .page-header {
            text-align: center;
            padding: 4rem 1.5rem 2rem;
        }

        .page-header h1 { font-size: 3rem; font-weight: 800; margin-bottom: 0.5rem; }

        .pet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2.5rem;
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 1.5rem 4rem;
        }

        .pet-card {
            background: var(--white);
            border-radius: 24px;
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
        }

        .pet-card:hover { transform: translateY(-10px); box-shadow: var(--shadow); }

        .pet-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .pet-info { padding: 1.5rem; flex-grow: 1; display: flex; flex-direction: column; }

        .pet-info h3 { font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--dark); }

        .species-tag {
            display: inline-block;
            background: var(--light-bg);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .pet-desc { color: var(--gray); font-size: 0.95rem; margin-bottom: 1.5rem; line-height: 1.5; }

        .pet-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid #eee;
        }

        .price { font-weight: 800; color: var(--dark); font-size: 1.1rem; }
        .price span { font-weight: 400; color: var(--gray); font-size: 0.9rem; }

        .rent-btn {
            background: var(--secondary);
            color: white;
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .rent-btn:hover { background: var(--dark); transform: scale(1.05); }

        .cta-button {
            display: inline-block;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
            transition: var(--transition);
        }

        .cta-button:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4); }

        /* --- DESKTOP NAVIGATION --- */
        @media (min-width: 992px) {
            .hamburger { display: none; }
            nav { position: static; height: auto; width: auto; background: none; clip-path: none; display: block; }
            nav ul { display: flex; gap: 40px; }
            nav ul li { margin: 0; }
            nav a { font-size: 1rem; font-weight: 600; opacity: 0.8; position: relative; }
            nav a:hover, nav a.active { opacity: 1; }
            nav a.active::after {
                content: ''; position: absolute; bottom: -5px; left: 0;
                width: 100%; height: 2px; background: var(--primary); border-radius: 2px;
            }
        }

        footer { background: var(--dark); color: var(--white); padding: 5rem 1.5rem 2rem; text-align: center; }
        .footer-logo { font-size: 1.5rem; font-weight: 900; color: var(--primary); display: block; margin-bottom: 1rem; }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">
                <a href="index.html"><span>🐾</span> RentAPet</a>
            </div>
            
            <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>

            <nav id="nav-menu">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="pets.html" class="active">Available Pets</a></li>
                    <li><a href="rent.html">Rent a Pet</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="page-header">
            <h1>Meet Our Friends</h1>
            <p>Ready for a day of fun? Browse our friendly companions below.</p>
        </div>

        <div class="filter-section">
            <div class="filter-container">
                <div class="filter-group">
                    <label for="search">Search Name</label>
                    <input type="text" id="search" placeholder="e.g. Rocky...">
                </div>
                
                <div class="filter-group">
                    <label for="species-filter">Type of Pet</label>
                    <select id="species-filter">
                        <option value="all">All Animals</option>
                        <option value="Pet Rock">Pet Rocks</option>
                        <option value="Fish">Fish</option>
                        <option value="Chicken">Chickens</option>
                        <option value="Elephant">Elephants</option>
                        <option value="Dog">Dogs</option>
                        <option value="Cat">Cats</option>
                        <option value="Cow">Cows</option>
                        <option value="Horse">Horses</option>
                        <option value="Monkey">Monkeys</option>
                    </select>
                </div>

                <div class="filter-group">
                    <div style="display: flex; justify-content: space-between;">
                        <label for="price-filter">Max Price</label>
                        <span id="price-value">$5000</span>
                    </div>
                    <input type="range" id="price-filter" min="0" max="5000" value="5000">
                </div>
            </div>
        </div>

        <div class="pet-grid" id="pet-gallery">
            </div>

        <div style="text-align: center; margin-bottom: 4rem;">
            <a href="petform.html" class="cta-button">+ List Your Pet</a>
        </div>
    </main>

    <footer>
        <span class="footer-logo">🐾 RentAPet</span>
        <p>&copy; 2026 RentAPet | Making tails wag since 2024.</p>
    </footer>

    <script>
        // --- NAVIGATION LOGIC ---
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('nav-menu');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
            document.body.style.overflow = navMenu.classList.contains('active') ? 'hidden' : 'auto';
        });

        // --- FETCH AND DISPLAY PETS ---
        let allPets = []; 

        async function loadPets() {
            const gallery = document.getElementById('pet-gallery');
            
            try {
                const response = await fetch('pets.json'); 
                allPets = await response.json();
                
                console.log("Data loaded successfully:", allPets);
                displayPets(allPets); 
                
            } catch (error) {
                console.error("Error loading pets:", error);
                gallery.innerHTML = "<p>Oops! We couldn't load the pets right now. Please try again later.</p>";
            }
        }

        function displayPets(petsToDisplay) {
            const gallery = document.getElementById('pet-gallery');
            
            if (!petsToDisplay || petsToDisplay.length === 0) {
                gallery.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                        <p style="font-size: 1.2rem; color: var(--gray);">No pets found matching your criteria. Try adjusting your filters!</p>
                    </div>`;
                return;
            }

            gallery.innerHTML = petsToDisplay.map(pet => {
                // Unified fallbacks for different JSON keys
                const name = pet.pet_name || pet.name || "Unnamed Pet";
                const img = pet.pet_image || pet.image || "images/placeholder.jpg";
                const type = pet.pet_type || pet.species || pet.type || "Pet";
                const desc = pet.pet_description || pet.description || "No description provided.";
                const price = pet.pet_price || pet.price_per_day || pet.price || 0;
                const id = pet.pet_id || pet.id || "#";

                return `
                    <div class="pet-card">
                        <img src="${img}" alt="${name}" class="pet-image">
                        <div class="pet-info">
                            <span class="species-tag">${type}</span>
                            <h3>${name}</h3>
                            <p class="pet-desc">${desc}</p>
                            <div class="pet-footer">
                                <div class="price">$${price} <span>/ day</span></div>
                                <a href="rent.html?id=${id}" class="rent-btn">Rent Me</a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- FILTER LOGIC ---
        const searchInput = document.getElementById('search');
        const speciesSelect = document.getElementById('species-filter');
        const priceRange = document.getElementById('price-filter');
        const priceLabel = document.getElementById('price-value');

        function applyFilters() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedSpecies = speciesSelect.value;
            const maxPrice = parseInt(priceRange.value);

            priceLabel.textContent = `$${maxPrice}`;

            const filtered = allPets.filter(pet => {
                const name = (pet.pet_name || pet.name || "").toLowerCase();
                const desc = (pet.pet_description || pet.description || "").toLowerCase();
                const type = (pet.pet_type || pet.species || pet.type || "");
                const price = (pet.pet_price || pet.price_per_day || pet.price || 0);

                const matchesSearch = name.includes(searchTerm) || desc.includes(searchTerm);
                const matchesSpecies = selectedSpecies === 'all' || type === selectedSpecies;
                const matchesPrice = price <= maxPrice;
                
                return matchesSearch && matchesSpecies && matchesPrice;
            });

            displayPets(filtered);
        }

        searchInput.addEventListener('input', applyFilters);
        speciesSelect.addEventListener('change', applyFilters);
        priceRange.addEventListener('input', applyFilters);

        loadPets();
    </script>
</body>
</html>
